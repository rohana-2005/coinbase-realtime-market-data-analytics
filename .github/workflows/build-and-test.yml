name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Backend Build and Test
  backend:
    name: Backend - Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Build Backend
      run: |
        cd coinbase-backend
        ./mvnw clean package -DskipTests
        
    - name: Run Backend Tests
      run: |
        cd coinbase-backend
        ./mvnw test
        
    - name: Build Backend Docker Image
      run: |
        cd coinbase-backend
        docker build -t coinbase-backend:${{ github.sha }} .
        docker tag coinbase-backend:${{ github.sha }} coinbase-backend:latest

  # Frontend Build and Test
  frontend:
    name: Frontend - Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install pnpm
      run: npm install -g pnpm
        
    - name: Install Dependencies
      run: |
        cd coinbase-frontend
        pnpm install
        
    - name: Build Frontend
      run: |
        cd coinbase-frontend
        pnpm run build
        
    - name: Build Frontend Docker Image
      run: |
        cd coinbase-frontend
        docker build -t coinbase-frontend:${{ github.sha }} .
        docker tag coinbase-frontend:${{ github.sha }} coinbase-frontend:latest

  # Flink Build
  flink:
    name: Flink - Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Build Flink Job
      run: |
        cd coinbase-flink
        ./mvnw clean package -DskipTests
        
    - name: Upload Flink JAR
      uses: actions/upload-artifact@v4
      with:
        name: flink-job
        path: coinbase-flink/target/*.jar

  # Summary
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [backend, frontend, flink]
    
    steps:
    - name: Build Success
      run: |
        echo "✅ All builds completed successfully!"
        echo "Backend: ✅"
        echo "Frontend: ✅"
        echo "Flink: ✅"
